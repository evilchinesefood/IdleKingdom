<!doctype html>
<html lang="en" class="wa-theme-default wa-palette-default kingdom-theme">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#3a3f44" />
    <title>IdleKingdom</title>
    <link rel="icon" type="image/png" href="./Source/Assets/Icon.png" />
    <link rel="apple-touch-icon" href="./Source/Assets/Icon.png" />
    <link rel="manifest" href="./Manifest.webmanifest" />
    <!-- Web Awesome v3.7.0 (vendored, buildless) -->
    <link
      rel="stylesheet"
      href="./Source/Vendor/WebAwesome/styles/webawesome.css"
    />
    <script
      type="module"
      src="./Source/Vendor/WebAwesome/webawesome.loader.js"
      data-webawesome="/kingdom/Source/Vendor/WebAwesome/"
    ></script>
    <!-- Font Awesome Pro Duotone (vendored webfonts) -->
    <link
      rel="stylesheet"
      href="./Source/Vendor/FontAwesome/css/fontawesome.css"
    />
    <link rel="stylesheet" href="./Source/Vendor/FontAwesome/css/duotone.css" />
    <!-- VT323 for the Settings "made with love" credit; online-only, falls back
         to monospace offline (cross-origin, not in the SW cache by design). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <!-- Vendored OFL fonts (must precede app styles) -->
    <link rel="stylesheet" href="./Source/Styles/Fonts.css" />
    <!-- Palette vars first, then WaTheme consumes them to override WA tokens
         (WaTheme still loads after webawesome.css in <head>, so it wins). -->
    <link rel="stylesheet" href="./Source/Styles/Theme.css" />
    <link rel="stylesheet" href="./Source/Styles/Reset.css" />
    <link rel="stylesheet" href="./Source/Styles/WaTheme.css" />
    <link rel="stylesheet" href="./Source/Styles/Layout.css" />
    <link rel="stylesheet" href="./Source/Styles/Graph.css" />
  </head>
  <body>
    <div id="App"></div>
    <script type="module" src="./Source/Main.js"></script>
  </body>
</html>
